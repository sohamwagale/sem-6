<html>
<head>
  <title>Simple Array</title>
</head>
<body>

<h2>JavaScript Array Example</h2>

<script>
  let arr = [];
  let n = parseInt(prompt("Enter number of array elements:"));

  for (let i = 0; i < n; i++) {
    arr[i] = prompt("Enter element " + (i + 1));
  }

  document.write("Array elements are:<br>");
  for (let i = 0; i < arr.length; i++) {
    document.write(arr[i] + "<br>");
  }
</script>

</body>
</html>
