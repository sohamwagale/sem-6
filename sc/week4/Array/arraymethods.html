<html>
<head>
  <title>methods Array </title>
</head>
<body>

<h2>JavaScript Array Methods</h2>

<script>
    let Numbers=[10,20,30,40,50];
    Numbers.push(60);
    document.write(Numbers);

    Numbers.pop();
    document.write("<br>"+Numbers);

    Numbers.unshift(4);
    document.write("<br>"+Numbers);

    Numbers.shift();
    document.write("<br>"+Numbers);

    Numbers.length;
    document.write("<br>"+Numbers);

    Numbers.indexOf(30);
    document.write("<br>"+Numbers);

    let Array=[70,80,90];
    Array.concat(Numbers);
    document.write("<br>"+Numbers);

    Numbers.join("-");
    document.write("<br>"+Numbers);


    Numbers.forEach(function(value){
        document.write("<br>"+value);

    })


</script>
</body>
</html>
