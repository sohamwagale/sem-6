<!DOCTYPE html>
<html>
<head>
  <title>Class & Object Example</title>
</head>
<body>

<h2>Student Details</h2>
<p id="output"></p>

<script>
  class Student {
    constructor(name, age, marks) {
      this.name = name;
      this.age = age;
      this.marks = marks;
    }

    getInfo() {
      return `Name: ${this.name}, Age: ${this.age}, Marks: ${this.marks}`;
    }
  }

  let s1 = new Student("Aryan", 21, 85);
 
  document.getElementById("output").innerText = s1.getInfo();
</script>

</body>
</html>
